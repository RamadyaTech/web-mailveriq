<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | MailVeriQ</title>
  <link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--bg, #fff);
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--navy, #0B1F3F);
      margin-bottom: 16px;
    }
    .error-page h2 { font-size: 1.5rem; font-weight: 700; color: var(--navy, #0B1F3F); margin-bottom: 12px; }
    .error-page p { color: var(--text-secondary, #64748b); margin-bottom: 32px; max-width: 400px; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back to safety.</p>
      <a href="./index.html" class="btn btn-primary btn-lg">Back to Home</a>
    </div>
  </div>
</body>
</html>
